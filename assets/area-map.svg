<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">都筑区周辺のおすすめエリアMAP</title>
  <desc id="desc">横浜市都筑区を中心に、緑区、港北区、青葉区の候補エリアを示す簡易マップ。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf7f3"/>
      <stop offset="1" stop-color="#dcebe7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1d3435" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1080" height="720" fill="url(#bg)"/>
  <path d="M80 520 C210 450 300 488 430 420 C568 348 660 356 812 270 C900 220 972 210 1040 186" fill="none" stroke="#a9c7c3" stroke-width="28" stroke-linecap="round" opacity=".55"/>
  <path d="M118 152 C274 232 346 198 496 278 C642 356 742 384 946 358" fill="none" stroke="#bdd4d1" stroke-width="22" stroke-linecap="round" opacity=".75"/>
  <path d="M182 640 C280 530 310 430 410 344 C508 260 626 222 790 94" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity=".9"/>
  <path d="M180 640 C278 530 312 430 410 344 C508 260 626 222 790 94" fill="none" stroke="#8fb9b3" stroke-width="4" stroke-linecap="round"/>
  <path d="M92 380 C250 368 378 386 528 360 C680 334 800 282 982 288" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity=".9"/>
  <path d="M92 380 C250 368 378 386 528 360 C680 334 800 282 982 288" fill="none" stroke="#8fb9b3" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <path d="M470 232 L680 208 L794 334 L714 492 L506 508 L396 356 Z" fill="#0f766e" opacity=".92"/>
    <text x="594" y="344" text-anchor="middle" fill="#fff" font-family="Yu Gothic, Meiryo, sans-serif" font-size="40" font-weight="700">都筑区</text>
    <text x="594" y="390" text-anchor="middle" fill="#d8f0ea" font-family="Yu Gothic, Meiryo, sans-serif" font-size="24">勤務地エリア</text>
  </g>

  <g>
    <path d="M212 388 L404 334 L506 508 L398 640 L174 606 Z" fill="#f3b35c" opacity=".92"/>
    <text x="335" y="514" text-anchor="middle" fill="#3a2a12" font-family="Yu Gothic, Meiryo, sans-serif" font-size="34" font-weight="700">緑区</text>
    <text x="335" y="552" text-anchor="middle" fill="#4f3d22" font-family="Yu Gothic, Meiryo, sans-serif" font-size="22">中山・鴨居</text>
  </g>

  <g>
    <path d="M680 208 L900 176 L1002 340 L794 334 Z" fill="#7aa6d8" opacity=".94"/>
    <text x="844" y="270" text-anchor="middle" fill="#10253d" font-family="Yu Gothic, Meiryo, sans-serif" font-size="34" font-weight="700">青葉区</text>
    <text x="844" y="308" text-anchor="middle" fill="#1c3654" font-family="Yu Gothic, Meiryo, sans-serif" font-size="22">藤が丘</text>
  </g>

  <g>
    <path d="M506 508 L714 492 L850 610 L656 674 L436 642 Z" fill="#e57973" opacity=".94"/>
    <text x="654" y="585" text-anchor="middle" fill="#421717" font-family="Yu Gothic, Meiryo, sans-serif" font-size="34" font-weight="700">港北区</text>
    <text x="654" y="624" text-anchor="middle" fill="#5c2220" font-family="Yu Gothic, Meiryo, sans-serif" font-size="22">新横浜</text>
  </g>

  <g fill="#203236" font-family="Yu Gothic, Meiryo, sans-serif">
    <text x="56" y="74" font-size="42" font-weight="800">おすすめエリアMAP</text>
    <text x="58" y="114" font-size="24" fill="#55706c">車通勤20分前後・駐車場ありを前提に整理</text>
  </g>

  <g>
    <circle cx="592" cy="374" r="14" fill="#ffffff"/>
    <circle cx="592" cy="374" r="7" fill="#0f766e"/>
    <text x="616" y="381" fill="#ffffff" font-family="Yu Gothic, Meiryo, sans-serif" font-size="20" font-weight="700">職場想定</text>
  </g>
</svg>
